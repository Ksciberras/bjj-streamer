services:
  db:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: bjj
      POSTGRES_USER: bjj
      POSTGRES_PASSWORD: bjj
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjj -d bjj"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: deploy/Dockerfile.migrate
    command: ["up"]
    environment: &app-environment
      APP_ENV: development
      DATABASE_URL: postgres://bjj:bjj@db:5432/bjj?sslmode=disable
      LOG_LEVEL: info
      AUTH_COOKIE_SECURE: "false"
      INVITATION_TTL: 24h
      SESSION_IDLE_TTL: 12h
      SESSION_ABSOLUTE_TTL: 168h
      LOGIN_RATE_LIMIT: 10
      INVITATION_RATE_LIMIT: 10
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    environment:
      <<: *app-environment
      HTTP_ADDR: ":8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    init: true
    stop_grace_period: 15s

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    init: true

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:8080"

volumes:
  postgres-data:
