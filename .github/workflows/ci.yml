name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: bjj_test
          POSTGRES_USER: bjj
          POSTGRES_PASSWORD: bjj
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bjj -d bjj_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    env:
      APP_ENV: test
      DATABASE_URL: postgres://bjj:bjj@localhost:5432/bjj_test?sslmode=disable
      TEST_DATABASE_URL: postgres://bjj:bjj@localhost:5432/bjj_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go run ./cmd/migrate up
      - run: go test -race ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose up --build --wait
      - run: curl --fail http://localhost:8080/healthz
      - run: curl --fail http://localhost:8080/readyz
      - if: always()
        run: docker compose down --volumes
